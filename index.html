<body>
    <div class="container">
        <h1>🔮 塔羅牌占卜 🔮</h1>
        
        <div class="main-content">
            <!-- Control Panel -->
            <div class="control-panel">
                <h2>占卜設定</h2>
                
                <div class="form-group">
                    <label for="questionType">問題類型</label>
                    <select id="questionType">
                        <option value="general">一般問題</option>
                        <option value="love">感情問題</option>
                        <option value="career">事業問題</option>
                        <option value="finance">財務問題</option>
                        <option value="health">健康問題</option>
                        <option value="spiritual">靈性問題</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="spreadType">牌陣選擇</label>
                    <select id="spreadType">
                        <option value="single">單張牌（今日提醒）</option>
                        <option value="three">三張牌（過去/現在/未來）</option>
                    </select>
                </div>

                <div class="form-group">
                    <div class="checkbox-group">
                        <input type="checkbox" id="allowReversed" checked>
                        <label for="allowReversed" style="margin-bottom: 0;">啟用逆位</label>
                    </div>
                </div>

                <div class="form-group">
                    <label for="questionText">問題描述（可選）</label>
                    <input type="text" id="questionText" placeholder="輸入你的問題...">
                </div>

                <div class="button-group">
                    <button class="btn-primary" id="drawBtn" onclick="drawCards()">開始抽牌</button>
                    <button class="btn-secondary" id="redrawBtn" onclick="redrawCards()" disabled>重抽</button>
                    <button class="btn-secondary" id="clearBtn" onclick="clearReading()" disabled>清除</button>
                </div>
            </div>

            <!-- Result Panel -->
            <div class="result-panel">
                <h2>占卜結果</h2>
                <div id="resultContent">
                    <div class="no-result">
                        <p>✨ 尚未抽牌 ✨</p>
                        <p style="font-size: 0.9rem; margin-top: 10px;">請在左側設定占卜條件，然後點擊「開始抽牌」</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

                keywords: ["完成", "成就", "整合"],
                upright: "世界象徵完成、成就和圓滿。一個重要的循環結束，目標達成。慶祝你的成功，同時準備迎接新的旅程。這是整合經驗、達到和諧的時刻。",
                reversed: "逆位的世界可能表示未完成、延遲或缺乏閉合。需要完成未盡的事務，不要急於開始新計劃。先結束舊循環，才能真正前進。"
            }
        ];

        // Spread Configurations
        const spreadConfigs = {
            single: {
                id: "single",
                name: "單張牌",
                positions: [
                    { id: "reminder", title: "今日提醒", desc: "今天需要注意或關注的訊息" }
                ]
            },
            three: {
                id: "three",
                name: "三張牌",
                positions: [
                    { id: "past", title: "過去", desc: "影響現況的過去因素" },
                    { id: "present", title: "現在", desc: "當前的狀況與挑戰" },
                    { id: "future", title: "未來", desc: "可能的發展與結果" }
                ]
            }
        };

        // Question Types
        const questionTypes = {
            general: "一般問題",
            love: "感情問題",
            career: "事業問題",
            finance: "財務問題",
            health: "健康問題",
            spiritual: "靈性問題"
        };

        // Current reading state
        let currentReading = null;

        // Fisher-Yates Shuffle Algorithm
        function shuffleArray(array) {
            const shuffled = [...array];
            // Use crypto.getRandomValues if available, otherwise fallback to Math.random
            const getRandomValue = () => {
                if (window.crypto && window.crypto.getRandomValues) {
                    const array = new Uint32Array(1);
                    window.crypto.getRandomValues(array);
                    return array[0] / (0xffffffff + 1);
                }
                return Math.random();
            };

            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(getRandomValue() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        // Draw Cards Function
        function drawCards() {
            const startTime = performance.now();

            try {
                const spreadType = document.getElementById('spreadType').value;
                const questionType = document.getElementById('questionType').value;
                const allowReversed = document.getElementById('allowReversed').checked;
                const questionText = document.getElementById('questionText').value.trim();

                const spread = spreadConfigs[spreadType];
                const numCards = spread.positions.length;

                // Validate card database
                if (cardDatabase.length < numCards) {
                    showError(`牌庫不足！至少需要 ${numCards} 張牌，但目前只有 ${cardDatabase.length} 張。`);
                    return;
                }

                // Shuffle and draw cards
                const shuffledDeck = shuffleArray(cardDatabase);
                const drawnCards = shuffledDeck.slice(0, numCards);

                // Determine orientation for each card
                const results = drawnCards.map((card, index) => {
                    const isReversed = allowReversed && Math.random() < 0.5;
                    return {
                        card: card,
                        position: spread.positions[index],
                        isReversed: isReversed
                    };
                });

                // Store current reading
                currentReading = {
                    spreadType: spreadType,
                    spreadName: spread.name,
                    questionType: questionType,
                    questionTypeName: questionTypes[questionType],
                    questionText: questionText,
                    allowReversed: allowReversed,
                    results: results,
                    timestamp: new Date()
                };

                // Display results
                displayReading();

                // Enable redraw and clear buttons
                document.getElementById('redrawBtn').disabled = false;
                document.getElementById('clearBtn').disabled = false;

                // Check performance
                const endTime = performance.now();
                const renderTime = endTime - startTime;
                console.log(`Rendering completed in ${renderTime.toFixed(2)}ms`);

            } catch (error) {
                showError(`抽牌時發生錯誤：${error.message}`);
                console.error(error);
            }
        }

        // Redraw Cards Function
        function redrawCards() {
            if (!currentReading) return;
            drawCards();
        }

        // Clear Reading Function
        function clearReading() {
            currentReading = null;
            
            // Clear question text
            document.getElementById('questionText').value = '';
            
            // Display empty state
            const resultContent = document.getElementById('resultContent');
            resultContent.innerHTML = `
                <div class="no-result">
                    <p>✨ 尚未抽牌 ✨</p>
                    <p style="font-size: 0.9rem; margin-top: 10px;">請在左側設定占卜條件，然後點擊「開始抽牌」</p>
                </div>
            `;

            // Disable redraw and clear buttons
            document.getElementById('redrawBtn').disabled = true;
            document.getElementById('clearBtn').disabled = true;
        }

        // Display Reading Function
        function displayReading() {
            if (!currentReading) return;

            const resultContent = document.getElementById('resultContent');
            
            // Build reading info section
            let infoHTML = `
                <div class="reading-info">
                    <p><strong>問題類型：</strong>${currentReading.questionTypeName}</p>
                    <p><strong>牌陣：</strong>${currentReading.spreadName}</p>
                    ${currentReading.questionText ? `<p><strong>問題：</strong>${currentReading.questionText}</p>` : ''}
                    <p><strong>逆位：</strong>${currentReading.allowReversed ? '已啟用' : '未啟用'}</p>
                    <p><strong>狀態：</strong>已完成｜${currentReading.results.length} 張牌</p>
                </div>
            `;

            // Build cards container
            let cardsHTML = '<div class="cards-container">';
            currentReading.results.forEach(result => {
                const { card, position, isReversed } = result;
                const interpretation = isReversed ? card.reversed : card.upright;
                const orientationClass = isReversed ? 'reversed' : 'upright';
                const orientationText = isReversed ? '逆位' : '正位';

                cardsHTML += `
                    <div class="card-result">
                        <div class="card-position">${position.title}</div>
                        <div class="card-name">${card.name}</div>
                        <span class="card-orientation ${orientationClass}">${orientationText}</span>
                        <div class="card-keywords">關鍵字：${card.keywords.join('、')}</div>
                        <div class="card-interpretation">${interpretation}</div>
                    </div>
                `;
            });
            cardsHTML += '</div>';

            // Build summary
            const keywords = currentReading.results.map(r => r.card.keywords[0]).join('、');
            const summaryHTML = `
                <div class="summary">
                    <h3>總結</h3>
                    <p>關於你的${currentReading.questionTypeName}，透過「${currentReading.spreadName}」牌陣的指引，
                    核心訊息圍繞在「${keywords}」這些主題上。
                    ${generateCustomSummary(currentReading)}</p>
                </div>
            `;

            resultContent.innerHTML = infoHTML + cardsHTML + summaryHTML;
        }

        // Generate Custom Summary
        function generateCustomSummary(reading) {
            const { spreadType, results } = reading;
            
            if (spreadType === 'single') {
                const card = results[0];
                return `今天的提醒著重於「${card.card.keywords[0]}」的能量，
                ${card.isReversed ? '請特別注意可能的挑戰或需要調整的地方。' : '這是一個正向發展的徵兆。'}`;
            } else if (spreadType === 'three') {
                return `從過去的「${results[0].card.keywords[0]}」，
                到現在的「${results[1].card.keywords[0]}」，
                再到未來的「${results[2].card.keywords[0]}」，
                顯示出一個清晰的發展脈絡。建議你整合這些訊息，做出最適合的決定。`;
            }
            
            return '請仔細思考這些牌卡帶來的訊息，它們將為你指引方向。';
        }

        // Show Error Function
        function showError(message) {
            const resultContent = document.getElementById('resultContent');
            resultContent.innerHTML = `
                <div class="error-message">
                    <strong>⚠️ 錯誤</strong>
                    <p>${message}</p>
                </div>
            `;
        }

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('塔羅牌占卜系統已就緒');
            console.log(`牌庫大小：${cardDatabase.length} 張牌`);
        });
    </script>
</body>
</html>
